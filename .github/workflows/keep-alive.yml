name: Keep backend awake

# Pings the Render backend's health endpoint so the free instance doesn't sleep.
# NOTE: GitHub's scheduled runs can be delayed/skipped under load, so this is a
# best-effort helper. For dependable keep-alive, also add an external monitor
# (e.g. cron-job.org / UptimeRobot) hitting the same URL every 5 minutes.

on:
  schedule:
    - cron: '*/10 * * * *' # every 10 minutes (GitHub may delay during peak load)
  workflow_dispatch: {} # lets you run it manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/health
        run: |
          echo "Pinging backend (cold start can take ~40s)…"
          curl -fsS --max-time 90 https://diamond-inventory-api.onrender.com/api/health \
            && echo " ✓ awake" \
            || echo "Ping failed — will retry next run"
